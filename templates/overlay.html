<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Life Tracker Overlay — {{ match }}</title>
  <style>
    :root {
      --bottom-spacing:      10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    body {
      position: relative;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ─────────────────────────────────────────────
       Each player panel spans from the screen edge
       to just before the timer (960px centre ± 210px
       for the 420px timer-wrap).
       P1: left:0  → right:960px (i.e. width 750px)
       P2: left:960px → right:0  (i.e. width 750px)
       Both panels are a horizontal flex row:
         life | col-outer | col-inner
       P2 reverses so col-inner is closest to centre.
    ───────────────────────────────────────────── */

    .panel {
      position: absolute;
      top: 0;
      width: 825px;          /* screen half minus half the timer width */
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 24px;
    }

    .panel.p1 { left: 0;    flex-direction: row; }
    .panel.p2 { right: 0;   flex-direction: row-reverse; }

    .life-col {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .panel.p1 .life-col { align-items: flex-start; }
    .panel.p2 .life-col { align-items: flex-end; }

    /* ── Life total ── */
    .life {
      font-size: 7.5rem;
      font-weight: 700;
      line-height: 1;
      color: #ffffff;
      white-space: nowrap;
      flex-shrink: 0;
      width: 3ch;
      font-variant-numeric: tabular-nums;
    }

    .panel.p1 .life { text-align: left; }
    .panel.p2 .life { text-align: right; }

    .life.changed { animation: pop 0.22s ease; }

    @keyframes pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* ── Info columns fill remaining width ── */
    .player-info {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: flex-end; 
      padding-top: 10px; 
      min-width: 0;
      align-self: stretch;
      height: 100%;
    }

    /* P1: name/deck left, pronouns/record pushed to the right edge */
    .panel.p1 .player-info { justify-content: space-between; }
    /* P2: mirror — pronouns/record left (near timer), name/deck right */
    .panel.p2 .player-info { justify-content: space-between; flex-direction: row-reverse; }

    .info-col {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 35px;
    }

    /* outer col aligns text toward the life total */
    .panel.p1 .info-col.outer { align-items: flex-start; }
    .panel.p2 .info-col.outer { align-items: flex-end; }

    /* inner col aligns text toward the timer */
    .panel.p1 .info-col.inner { align-items: flex-end; }
    .panel.p2 .info-col.inner { align-items: flex-start; }

    .info-name {
      font-size: 2.8rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.1;
    }

    .info-deck {
      font-size: 1.7rem;
      font-weight: 400;
      color: #ffffff;
      /*color: rgba(255,255,255,0.75);*/
      line-height: 1.2;
    }

    .info-pronouns {
      font-size: 1.7rem;
      font-weight: 400;
      color: #ffffff;
      /*color: rgba(255,255,255,0.6);*/
      line-height: 1.1;
    }

    .info-record {
      font-size: 1.7rem;
      font-weight: 700;
      color: #ffffff;
      /*color: rgba(255,255,255,0.55);*/
      line-height: 1.1;
    }

    .info-name:empty,
    .info-deck:empty,
    .info-pronouns:empty,
    .info-record:empty { display: none; }

    .poison {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      /*color: rgba(200,120,255,0.9);*/
      white-space: nowrap;
      width: 3ch;
      font-variant-numeric: tabular-nums;
      margin-top: -25px; 
    }

    .panel.p1 .poison { text-align: right; margin-left: 155px;}
    .panel.p2 .poison { text-align: left; margin-right: 155px;}
    .poison[data-value="0"] { display: none; }

    /* ── Timer / score — centred ── */
    .timer-wrap {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .timer {
      font-size: 5rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
      letter-spacing: 0.04em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .score {
      font-size: 3.5rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
      letter-spacing: 0.06em;
      text-align: center;
      font-variant-numeric: tabular-nums;
      margin-top: -8px; 
    }

    /* ── Round — bottom right ── */
    .round {
      position: absolute;
      bottom: var(--bottom-spacing);
      right: 150px;
      font-size: 1.6rem;
      font-weight: 700;
      color: rgba(255,255,255,1);
      white-space: nowrap;
    }

    /* ── Event — bottom center (truly centered on screen) ── */
    .event {
      position: absolute;
      bottom: var(--bottom-spacing);
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      text-align: center;
    }

    /* commentators anchored just left of the event block */
    .commentators {
      position: absolute;
      bottom: var(--bottom-spacing);
      right: calc(50% + 320px);  /* sits left of the centered event */
      font-size: 1.5rem;
      font-weight: 400;
      color: rgba(255,255,255,1);
      white-space: nowrap;
      text-align: right;
    }

    .commentators:empty,
    .event:empty { display: none; }

    .round:empty { display: none; }
  </style>
</head>
<body>

  <!-- Player 1: life → name/deck → pronouns/record → [timer] -->
  <div class="panel p1">
    <div class="life-col">
      <div class="life" id="life1">20</div>
      <div class="poison" id="poison1" data-value="0"></div>
    </div>
    <div class="player-info">
      <div class="info-col outer">
        <div class="info-name" id="name1"></div>
        <div class="info-deck" id="deck1"></div>
      </div>
      <div class="info-col inner">
        <div class="info-pronouns" id="pronouns1"></div>
        <div class="info-record"   id="record1"></div>
      </div>
    </div>
  </div>

  <div class="timer-wrap">
    <div class="timer" id="timer">50:00</div>
    <div class="score" id="score">0-0</div>
  </div>

  <!-- Player 2: [timer] → pronouns/record → name/deck → life (mirrored) -->
  <div class="panel p2">
    <div class="life-col">
      <div class="life" id="life2">20</div>
      <div class="poison" id="poison2" data-value="0"></div>
    </div>
    <div class="player-info">
      <div class="info-col outer">
        <div class="info-name" id="name2"></div>
        <div class="info-deck" id="deck2"></div>
      </div>
      <div class="info-col inner">
        <div class="info-pronouns" id="pronouns2"></div>
        <div class="info-record"   id="record2"></div>
      </div>
    </div>
  </div>

  <div class="round" id="round"></div>
  <div class="commentators" id="commentators"></div>
  <div class="event" id="event"></div>

<script>
  const MATCH = "{{ match }}";
  let prev = { p1: null, p2: null };
  let timerBase = null, timerLocalStart = null, timerRunning = false, timerCountUp = false;

  function fmtTime(secs) {
    const s = Math.floor(Math.max(0, secs));
    const m = Math.floor(s / 60);
    const ss = String(s % 60).padStart(2, '0');
    return `${m}:${ss}`;
  }

  setInterval(() => {
    if (!timerRunning || timerBase === null) return;
    const elapsed = (Date.now() - timerLocalStart) / 1000;
    const live = timerCountUp ? timerBase + elapsed : Math.max(0, timerBase - elapsed);
    document.getElementById('timer').textContent = fmtTime(live);
    if (!timerCountUp && live <= 0) timerRunning = false;
  }, 500);

  function setText(id, val) {
    document.getElementById(id).textContent = val || '';
  }

  function setPoison(id, val) {
    const el = document.getElementById(id);
    el.textContent  = val > 0 ? `☠ ${val}` : '';
    el.dataset.value = val;
  }

  async function poll() {
    try {
      const res  = await fetch(`/api/state/${MATCH}`);
      const data = await res.json();

      const el1 = document.getElementById('life1');
      const el2 = document.getElementById('life2');

      if (prev.p1 !== data.player1.life) {
        el1.classList.remove('changed');
        void el1.offsetWidth;
        el1.classList.add('changed');
        el1.textContent = data.player1.life;
        prev.p1 = data.player1.life;
      }

      if (prev.p2 !== data.player2.life) {
        el2.classList.remove('changed');
        void el2.offsetWidth;
        el2.classList.add('changed');
        el2.textContent = data.player2.life;
        prev.p2 = data.player2.life;
      }

      setText('name1',     data.player1.name);
      setText('deck1',     data.player1.deck);
      setText('pronouns1', data.player1.pronouns);
      setText('record1',   data.player1.record);
      setPoison('poison1', data.player1.poison);

      setText('name2',     data.player2.name);
      setText('deck2',     data.player2.deck);
      setText('pronouns2', data.player2.pronouns);
      setText('record2',   data.player2.record);
      setPoison('poison2', data.player2.poison);

      const t = data.timer;
      timerBase       = t.seconds;
      timerLocalStart = Date.now();
      timerRunning    = t.running;
      timerCountUp    = t.count_up;
      document.getElementById('timer').textContent = fmtTime(t.seconds);

      document.getElementById('score').textContent =
        `${data.score.player1}-${data.score.player2}`;

      setText('round', data.round);
      setText('event', data.event);
      const commentators = [data.commentator1, data.commentator2]
        .map(c => (c || '').trim())
        .filter(Boolean)
        .join(' & ');
      setText('commentators', commentators ? `🎤 ${commentators}` : '');
    } catch (e) {}
  }

  poll();
  setInterval(poll, 2000);
</script>
</body>
</html>
