<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Tracker — Control Panel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0e0e12;
      --surface: #16161d;
      --border:  #2a2a38;
      --p1:      #e05c5c;
      --p1dim:   #5a2020;
      --p2:      #5c8fe0;
      --p2dim:   #1e3260;
      --text:    #e8e8f0;
      --muted:   #6060888;
      --green:   #4ecb71;
      --tab-act: #1e1e28;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    header p {
      margin-top: 6px;
      font-size: 0.75rem;
      color: #707090;
      letter-spacing: 0.05em;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }

    .tab-btn {
      background: none;
      border: none;
      border-radius: 7px;
      color: #707090;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 8px 28px;
      text-transform: uppercase;
      transition: color 0.15s, background 0.15s;
    }

    .tab-btn.active {
      background: var(--tab-act);
      color: var(--text);
    }

    /* ── Match panel ── */
    .match-panel { display: none; width: 100%; max-width: 720px; }
    .match-panel.active { display: block; }

    .match-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .match-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #707090;
    }

    .obs-link {
      font-size: 0.72rem;
      color: #5c8fe0;
      background: #16161d;
      border: 1px solid #2a2a38;
      border-radius: 4px;
      padding: 3px 8px;
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .obs-link:hover { border-color: #5c8fe0; }

    /* ── Player cards ── */
    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .card.p1 { border-top: 3px solid var(--p1); }
    .card.p2 { border-top: 3px solid var(--p2); }

    .name-row {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
    }

    .name-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a0a0c0;
      text-align: center;
      width: 100%;
      padding: 4px 0;
    }

    .card.p1 .name-label { color: #c07070; }
    .card.p2 .name-label { color: #7090c0; }

    .poison-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .poison-label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #707090;
      flex-shrink: 0;
    }

    .poison-count {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #a060c0;
      min-width: 24px;
      text-align: center;
    }

    .btn-poison {
      background: #2a1a3a;
      border: 1px solid #4a2a6a;
      border-radius: 6px;
      color: #c080e0;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 3px 10px;
      transition: filter 0.12s;
    }

    .btn-poison:hover { filter: brightness(1.3); }

    .life-display {
      font-family: 'Rajdhani', sans-serif;
      font-size: 4.8rem;
      font-weight: 700;
      line-height: 1;
      transition: transform 0.15s;
    }

    .card.p1 .life-display { color: var(--p1); }
    .card.p2 .life-display { color: var(--p2); }
    .life-display.bump { transform: scale(1.1); }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      width: 100%;
    }

    .btn {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 9px 0;
      text-transform: uppercase;
      transition: filter 0.12s, transform 0.1s;
    }

    .btn:active  { transform: scale(0.95); }
    .btn:hover   { filter: brightness(1.15); }

    .btn-dec     { background: var(--border); color: var(--text); }
    .btn-dec-5   { background: var(--border); color: #707090; font-size: 0.82rem; }

    .card.p1 .btn-inc   { background: var(--p1);    color: #200a0a; }
    .card.p1 .btn-inc-5 { background: var(--p1dim); color: var(--p1); font-size: 0.82rem; }
    .card.p2 .btn-inc   { background: var(--p2);    color: #040e20; }
    .card.p2 .btn-inc-5 { background: var(--p2dim); color: var(--p2); font-size: 0.82rem; }

    .reset-player {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #707090;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 6px 0;
      text-transform: uppercase;
      width: 100%;
      transition: color 0.15s, border-color 0.15s;
    }

    .reset-player:hover { color: var(--text); border-color: #505070; }

    /* ── Reset match row ── */
    .reset-match-row {
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }

    .btn-reset-match {
      background: none;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #707090;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 9px 28px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-reset-match:hover { color: var(--text); border-color: #505070; }

    /* ── Score ── */
    .score-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .score-player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .score-label {
      font-size: 0.72rem;
      color: #707090;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .score-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-section .card.p1 .score-value,
    .score-p1 { color: var(--p1); }
    .score-p2 { color: var(--p2); }

    .score-adj {
      display: flex;
      gap: 6px;
    }

    .btn-score {
      background: var(--border);
      border: none;
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 5px 13px;
      transition: filter 0.12s, transform 0.1s;
    }

    .btn-score:active { transform: scale(0.93); }
    .btn-score:hover  { filter: brightness(1.2); }

    .score-divider {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #404060;
      padding: 0 4px;
    }

    .score-reset-row {
      display: flex;
      justify-content: flex-end;
    }

    .btn-score-reset {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #505070;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-score-reset:hover { color: var(--text); border-color: #505070; }

    /* ── Timer ── */
    .timer-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .timer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .timer-display {
      font-family: 'Rajdhani', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
    }

    .timer-display.running { color: var(--green); }
    .timer-display.finished { color: #707090; }

    .timer-mode {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: #707090;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    .timer-mode input[type="checkbox"] {
      accent-color: var(--green);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .timer-btns {
      display: flex;
      gap: 8px;
    }

    .btn-timer {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 9px 20px;
      text-transform: uppercase;
      transition: filter 0.12s, transform 0.1s;
      flex: 1;
    }

    .btn-timer:active { transform: scale(0.95); }
    .btn-timer:hover  { filter: brightness(1.15); }

    .btn-timer-start  { background: var(--green);  color: #0a1a0a; }
    .btn-timer-pause  { background: #3a3a50;        color: var(--text); }
    .btn-timer-reset  { background: none; border: 1px solid var(--border); color: #707090; }
    .btn-timer-reset:hover { color: var(--text); border-color: #505070; }

    /* ── Global reset ── */
    .global-reset {
      margin-top: 32px;
      text-align: center;
    }

    .btn-reset-all {
      background: none;
      border: 1px solid #2a2030;
      border-radius: 8px;
      color: #505070;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 9px 28px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-reset-all:hover { color: #a090c0; border-color: #5040a0; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--green);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      padding: 10px 20px;
      pointer-events: none;
      transition: transform 0.22s ease, opacity 0.22s;
      opacity: 0;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (max-width: 520px) {
      .players { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>Life Tracker</h1>
  <p>TWO-MATCH CONTROL PANEL &nbsp;|&nbsp; <a href="/players" style="color:#5c8fe0;text-decoration:none;letter-spacing:0.04em">Player Info ↗</a></p>
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('match1')">Match 1</button>
  <button class="tab-btn"        onclick="switchTab('match2')">Match 2</button>
</div>

<!-- Match 1 -->
<div class="match-panel active" id="panel-match1">
  <div class="match-header">
    <span class="match-title">Match 1</span>
    <a class="obs-link" href="http://localhost:5000/overlay/match1" target="_blank">OBS: /overlay/match1 ↗</a>
  </div>
  <div class="players">
    <div class="card p1">
      <div class="name-row">
        <div class="name-label" id="name-match1-player1">Player 1</div>
      </div>
      <div class="life-display" id="life-match1-player1">20</div>
      <div class="controls">
        <button class="btn btn-inc"   onclick="adjust('match1','player1','increase',1)">+1</button>
        <button class="btn btn-dec"   onclick="adjust('match1','player1','decrease',1)">−1</button>
        <button class="btn btn-inc btn-inc-5" onclick="adjust('match1','player1','increase',5)">+5</button>
        <button class="btn btn-dec btn-dec-5" onclick="adjust('match1','player1','decrease',5)">−5</button>
      </div>
      <button class="reset-player" onclick="resetPlayer('match1','player1')">Reset to 20</button>
      <div class="poison-row">
        <span class="poison-label">☠ Poison</span>
        <button class="btn-poison" onclick="adjustPoison('match1','player1','decrease')">−</button>
        <span class="poison-count" id="poison-match1-player1">0</span>
        <button class="btn-poison" onclick="adjustPoison('match1','player1','increase')">+</button>
      </div>
    </div>
    <div class="card p2">
      <div class="name-row">
        <div class="name-label" id="name-match1-player2">Player 2</div>
      </div>
      <div class="life-display" id="life-match1-player2">20</div>
      <div class="controls">
        <button class="btn btn-inc"   onclick="adjust('match1','player2','increase',1)">+1</button>
        <button class="btn btn-dec"   onclick="adjust('match1','player2','decrease',1)">−1</button>
        <button class="btn btn-inc btn-inc-5" onclick="adjust('match1','player2','increase',5)">+5</button>
        <button class="btn btn-dec btn-dec-5" onclick="adjust('match1','player2','decrease',5)">−5</button>
      </div>
      <button class="reset-player" onclick="resetPlayer('match1','player2')">Reset to 20</button>
      <div class="poison-row">
        <span class="poison-label">☠ Poison</span>
        <button class="btn-poison" onclick="adjustPoison('match1','player2','decrease')">−</button>
        <span class="poison-count" id="poison-match1-player2">0</span>
        <button class="btn-poison" onclick="adjustPoison('match1','player2','increase')">+</button>
      </div>
    </div>
  </div>
  <div class="score-section" style="position:relative">
    <div class="score-player">
      <div class="score-label">P1 Wins</div>
      <div class="score-value score-p1" id="score-match1-player1">0</div>
      <div class="score-adj">
        <button class="btn-score" onclick="adjustScore('match1','player1','increase')">+</button>
        <button class="btn-score" onclick="adjustScore('match1','player1','decrease')">−</button>
      </div>
    </div>
    <div class="score-divider">—</div>
    <div class="score-player">
      <div class="score-label">P2 Wins</div>
      <div class="score-value score-p2" id="score-match1-player2">0</div>
      <div class="score-adj">
        <button class="btn-score" onclick="adjustScore('match1','player2','increase')">+</button>
        <button class="btn-score" onclick="adjustScore('match1','player2','decrease')">−</button>
      </div>
    </div>
    <div style="position:absolute;right:24px;bottom:14px">
      <button class="btn-score-reset" onclick="adjustScore('match1','player1','reset')">Reset Score</button>
    </div>
  </div>
  <div class="timer-section">
      <div class="timer-top">
      <div class="timer-display" id="timer-match1">50:00</div>
      <label class="timer-mode">
        <input type="checkbox" id="countup-match1" onchange="setMode('match1', this.checked)" />
        Count up
      </label>
    </div>
    </div>
    <div class="timer-btns">
      <button class="btn-timer btn-timer-start" id="btn-start-match1" onclick="timerStart('match1')">Start</button>
      <button class="btn-timer btn-timer-pause" onclick="timerPause('match1')">Pause</button>
      <button class="btn-timer btn-timer-reset" onclick="timerReset('match1')">Reset</button>
    </div>
  </div>
  <div class="reset-match-row">
    <button class="btn-reset-match" onclick="resetMatch('match1')">⟳ Reset Match 1</button>
  </div>
</div>

<!-- Match 2 -->
<div class="match-panel" id="panel-match2">
  <div class="match-header">
    <span class="match-title">Match 2</span>
    <a class="obs-link" href="http://localhost:5000/overlay/match2" target="_blank">OBS: /overlay/match2 ↗</a>
  </div>
  <div class="players">
    <div class="card p1">
      <div class="name-row">
        <div class="name-label" id="name-match2-player1">Player 3</div>
      </div>
      <div class="life-display" id="life-match2-player1">20</div>
      <div class="controls">
        <button class="btn btn-inc"   onclick="adjust('match2','player1','increase',1)">+1</button>
        <button class="btn btn-dec"   onclick="adjust('match2','player1','decrease',1)">−1</button>
        <button class="btn btn-inc btn-inc-5" onclick="adjust('match2','player1','increase',5)">+5</button>
        <button class="btn btn-dec btn-dec-5" onclick="adjust('match2','player1','decrease',5)">−5</button>
      </div>
      <button class="reset-player" onclick="resetPlayer('match2','player1')">Reset to 20</button>
      <div class="poison-row">
        <span class="poison-label">☠ Poison</span>
        <button class="btn-poison" onclick="adjustPoison('match2','player1','decrease')">−</button>
        <span class="poison-count" id="poison-match2-player1">0</span>
        <button class="btn-poison" onclick="adjustPoison('match2','player1','increase')">+</button>
      </div>
    </div>
    <div class="card p2">
      <div class="name-row">
        <div class="name-label" id="name-match2-player2">Player 4</div>
      </div>
      <div class="life-display" id="life-match2-player2">20</div>
      <div class="controls">
        <button class="btn btn-inc"   onclick="adjust('match2','player2','increase',1)">+1</button>
        <button class="btn btn-dec"   onclick="adjust('match2','player2','decrease',1)">−1</button>
        <button class="btn btn-inc btn-inc-5" onclick="adjust('match2','player2','increase',5)">+5</button>
        <button class="btn btn-dec btn-dec-5" onclick="adjust('match2','player2','decrease',5)">−5</button>
      </div>
      <button class="reset-player" onclick="resetPlayer('match2','player2')">Reset to 20</button>
      <div class="poison-row">
        <span class="poison-label">☠ Poison</span>
        <button class="btn-poison" onclick="adjustPoison('match2','player2','decrease')">−</button>
        <span class="poison-count" id="poison-match2-player2">0</span>
        <button class="btn-poison" onclick="adjustPoison('match2','player2','increase')">+</button>
      </div>
    </div>
  </div>
  <div class="score-section" style="position:relative">
    <div class="score-player">
      <div class="score-label">P1 Wins</div>
      <div class="score-value score-p1" id="score-match2-player1">0</div>
      <div class="score-adj">
        <button class="btn-score" onclick="adjustScore('match2','player1','increase')">+</button>
        <button class="btn-score" onclick="adjustScore('match2','player1','decrease')">−</button>
      </div>
    </div>
    <div class="score-divider">—</div>
    <div class="score-player">
      <div class="score-label">P2 Wins</div>
      <div class="score-value score-p2" id="score-match2-player2">0</div>
      <div class="score-adj">
        <button class="btn-score" onclick="adjustScore('match2','player2','increase')">+</button>
        <button class="btn-score" onclick="adjustScore('match2','player2','decrease')">−</button>
      </div>
    </div>
    <div style="position:absolute;right:24px;bottom:14px">
      <button class="btn-score-reset" onclick="adjustScore('match2','player1','reset')">Reset Score</button>
    </div>
  </div>
  <div class="timer-section">
    <div class="timer-top">
      <div class="timer-display" id="timer-match2">50:00</div>
      <label class="timer-mode">
        <input type="checkbox" id="countup-match2" onchange="setMode('match2', this.checked)" />
        Count up
      </label>
    </div>
    <div class="timer-btns">
      <button class="btn-timer btn-timer-start" id="btn-start-match2" onclick="timerStart('match2')">Start</button>
      <button class="btn-timer btn-timer-pause" onclick="timerPause('match2')">Pause</button>
      <button class="btn-timer btn-timer-reset" onclick="timerReset('match2')">Reset</button>
    </div>
  </div>
  <div class="reset-match-row">
    <button class="btn-reset-match" onclick="resetMatch('match2')">⟳ Reset Match 2</button>
  </div>
</div>

<!-- Global reset -->
<div class="global-reset">
  <button class="btn-reset-all" onclick="resetAll()">⟳ Reset All Matches</button>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Tab switching ──
  function switchTab(match) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['match1','match2'][i] === match);
    });
    document.querySelectorAll('.match-panel').forEach(p => {
      p.classList.toggle('active', p.id === `panel-${match}`);
    });
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ── Bump animation ──
  function bump(match, player) {
    const el = document.getElementById(`life-${match}-${player}`);
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 150);
  }

  // ── API helpers ──
  async function adjust(match, player, action, amount) {
    const res  = await fetch(`/api/life/${match}/${player}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, amount })
    });
    const data = await res.json();
    document.getElementById(`life-${match}-${player}`).textContent = data.life;
    bump(match, player);
  }

  async function resetPlayer(match, player) {
    const res  = await fetch(`/api/life/${match}/${player}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reset' })
    });
    const data = await res.json();
    document.getElementById(`life-${match}-${player}`).textContent = data.life;
    bump(match, player);
    showToast('Life reset to 20');
  }

  async function resetMatch(match) {
    const res  = await fetch(`/api/reset/${match}`, { method: 'POST' });
    const data = await res.json();
    ['player1','player2'].forEach(p => {
      document.getElementById(`life-${match}-${p}`).textContent = data[p].life;
      bump(match, p);
    });
    showToast(`Match reset`);
  }

  async function resetAll() {
    const res  = await fetch('/api/reset_all', { method: 'POST' });
    const data = await res.json();
    ['match1','match2'].forEach(m => {
      ['player1','player2'].forEach(p => {
        document.getElementById(`life-${m}-${p}`).textContent = data[m][p].life;
        bump(m, p);
      });
    });
    showToast('All matches reset');
  }

  async function saveName(match, player) {
    const name = document.getElementById(`name-${match}-${player}`).value.trim();
    if (!name) return;
    await fetch(`/api/name/${match}/${player}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    showToast('Name saved');
  }

  // Enter key saves name
  document.querySelectorAll('.name-input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const [, match, player] = inp.id.split('-');
      saveName(match, player);
    });
  });

  // ── Timer helpers ──
  function fmtTime(secs) {
    const s = Math.floor(secs);
    const m = Math.floor(s / 60);
    const ss = String(s % 60).padStart(2, '0');
    return `${m}:${ss}`;
  }

  function applyTimer(match, t) {
    const el = document.getElementById(`timer-${match}`);
    el.textContent = fmtTime(t.seconds);
    el.classList.toggle('running', t.running);
    el.classList.toggle('finished', !t.count_up && t.seconds <= 0);
    document.getElementById(`countup-${match}`).checked = t.count_up;
    const startBtn = document.getElementById(`btn-start-${match}`);
    const canStart = t.count_up || t.seconds > 0;
    startBtn.disabled = !canStart;
    startBtn.style.opacity = canStart ? '' : '0.4';
  }

  // Client-side tick so display updates every second without a server call
  const timerState = {};

  function tickTimers() {
    ['match1', 'match2'].forEach(match => {
      const t = timerState[match];
      if (!t || !t.running) return;
      const elapsed = (Date.now() - t._localStart) / 1000;
      const live = t.count_up
        ? t._baseSeconds + elapsed
        : Math.max(0, t._baseSeconds - elapsed);
      const el = document.getElementById(`timer-${match}`);
      el.textContent = fmtTime(live);
      if (!t.count_up && live <= 0) {
        el.classList.remove('running');
        el.classList.add('finished');
        t.running = false;
      }
    });
  }

  setInterval(tickTimers, 500);

  async function timerStart(match) {
    const res = await fetch(`/api/timer/${match}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'start' })
    });
    const t = await res.json();
    timerState[match] = { ...t, _baseSeconds: t.seconds, _localStart: Date.now() };
    applyTimer(match, t);
  }

  async function timerPause(match) {
    const res = await fetch(`/api/timer/${match}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'pause' })
    });
    const t = await res.json();
    timerState[match] = { ...t, _baseSeconds: t.seconds, _localStart: Date.now() };
    applyTimer(match, t);
  }

  async function timerReset(match) {
    const res = await fetch(`/api/timer/${match}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reset' })
    });
    const t = await res.json();
    timerState[match] = { ...t, _baseSeconds: t.seconds, _localStart: Date.now() };
    applyTimer(match, t);
  }

  async function setMode(match, countUp) {
    const res = await fetch(`/api/timer/${match}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'set_mode', count_up: countUp })
    });
    const t = await res.json();
    timerState[match] = { ...t, _baseSeconds: t.seconds, _localStart: Date.now() };
    applyTimer(match, t);
  }

  // ── Poison ──
  async function adjustPoison(match, player, action) {
    const res = await fetch(`/api/poison/${match}/${player}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action })
    });
    const data = await res.json();
    document.getElementById(`poison-${match}-${player}`).textContent = data.poison;
  }

  // ── Score ──
  async function adjustScore(match, player, action) {
    const res  = await fetch(`/api/score/${match}/${player}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action })
    });
    const data = await res.json();
    document.getElementById(`score-${match}-player1`).textContent = data.player1;
    document.getElementById(`score-${match}-player2`).textContent = data.player2;
  }

  // ── State sync (runs on load + every 2s to stay current across devices) ──
  function syncState(data) {
    ['match1','match2'].forEach(m => {
      ['player1','player2'].forEach(p => {
        document.getElementById(`life-${m}-${p}`).textContent   = data[m][p].life;
        document.getElementById(`name-${m}-${p}`).textContent   = data[m][p].name;
        document.getElementById(`poison-${m}-${p}`).textContent = data[m][p].poison;
      });
      document.getElementById(`score-${m}-player1`).textContent = data[m].score.player1;
      document.getElementById(`score-${m}-player2`).textContent = data[m].score.player2;

      // Timer: only re-baseline the local tick when the server state has
      // meaningfully changed (running flag, mode, or >1.5s drift from what
      // we're currently showing), so an idle poll doesn't cause a stutter.
      const t  = data[m].timer;
      const ex = timerState[m];
      let liveLocal = null;
      if (ex) {
        const elapsed = ex.running ? (Date.now() - ex._localStart) / 1000 : 0;
        liveLocal = ex.count_up
          ? ex._baseSeconds + elapsed
          : Math.max(0, ex._baseSeconds - elapsed);
      }
      const drifted = !ex
        || ex.running  !== t.running
        || ex.count_up !== t.count_up
        || Math.abs(liveLocal - t.seconds) > 1.5;
      if (drifted) {
        timerState[m] = { ...t, _baseSeconds: t.seconds, _localStart: Date.now() };
        applyTimer(m, t);
      }
    });
  }

  async function pollState() {
    try {
      const res = await fetch('/api/state');
      syncState(await res.json());
    } catch (e) { /* server momentarily unreachable, retry next tick */ }
  }

  // Initial load + continuous sync
  pollState();
  setInterval(pollState, 2000);
</script>
</body>
</html>
